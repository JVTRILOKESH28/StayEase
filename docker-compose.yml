services:
  app:
    build: .

    container_name: stayease-app

    ports:
      - "3000:3000"

    env_file:
      - .env

    depends_on:
      - mongodb

    restart: unless-stopped

  mongodb:
    image: mongo:8

    container_name: stayease-db

    ports:
      - "27017:27017"

    volumes:
      - mongodb_data:/data/db

    restart: unless-stopped

volumes:
  mongodb_data:
